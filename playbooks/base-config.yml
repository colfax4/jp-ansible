---

- hosts: classrooms
  remote_user: jp-user
  vars:
    ansible_ssh_private_key_file: .secrets/id_jp-user
  tasks:
    - name: Set clock to 12 hour format
      ansible.builtin.copy:
        src: "../files/panel"
        dest: "/home/jp-user/.config/lxpanel/LXDE-pi/panels/panel"

    - name: Restart lxpanel
      shell: "lxpanelctl restart"
      environment:
        DISPLAY: ":0"
